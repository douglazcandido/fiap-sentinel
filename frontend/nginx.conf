server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # compressao gzip para arquivos estaticos
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # cache agressivo para assets com hash no nome (gerados pelo Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # fallback para SPA: qualquer rota nao encontrada cai no index.html,
    # deixando o React Router resolver o caminho no client-side
    location / {
        try_files $uri $uri/ /index.html;
    }
}
